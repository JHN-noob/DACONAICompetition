experiment:
  name: efficientnetv2_m_384_baseline

paths:
  train_csv: data/train.csv
  dev_csv: data/dev.csv
  sample_submission_csv: data/sample_submission.csv
  train_image_root: data/train
  dev_image_root: data/dev
  test_image_root: data/test
  outputs:
    checkpoints_dir: outputs/checkpoints
    oof_dir: outputs/oof
    logs_dir: outputs/logs
    calibration_dir: outputs/calibration
    submissions_dir: outputs/submissions

runtime:
  seed: 42
  device:
  num_workers: 0
  pin_memory: true
  amp: true

data:
  image_size: 384
  train_resize_size: 384
  train_crop_size: 384
  eval_resize_size: 384
  eval_crop_size: 384
  use_dev_for_validation: true
  val_ratio: 0.1
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

augmentation:
  brightness_contrast_p: 0.6
  brightness_limit: [0.18, 0.22]
  contrast_limit: [0.18, 0.22]
  gamma_p: 0.4
  gamma_range: [0.85, 1.15]
  shadow_p: [0.15, 0.2]
  affine_p: 0.4
  shift_limit: 0.04
  scale_limit: 0.05
  rotate_limit: 2.0
  noise_p: 0.08
  noise_std_range: [0.0, 0.015]
  blur_p: 0.08
  blur_sigma_range: [0.1, 0.7]
  compression_p: 0.08
  jpeg_quality_range: [75, 95]

model:
  backbone_name: tf_efficientnetv2_m
  pretrained: true
  head_hidden_dim: 512
  drop_rate: 0.15
  activation: gelu

train:
  batch_size: 4
  epochs: 15
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_accum_steps: 4
  max_grad_norm: 1.0
  warmup_epochs: 1
  patience: 5
  label_smoothing: 0.02
  mixup_alpha: 0.0

oof:
  n_splits: 5
  seeds: [42, 52]
  save_dev_predictions: true
  save_test_predictions: true

hard_finetune:
  enabled: true
  reference_oof_path: outputs/oof/efficientnetv2_m_384_oof.csv
  label0_top_percent: 0.12
  label1_top_percent: 0.05
  label0_duplicate_factor: 4
  label1_duplicate_factor: 2
  duplicate_factor: 3
  epochs: 3
  lr: 3.0e-5
  weight_decay: 1.0e-4
  warmup_epochs: 0
  patience: 2
  mixup_alpha: 0.0

calibration:
  allowed_methods: [temperature]
  selection_split: oof
  temperature_candidates: [0.70, 0.75, 0.80, 0.85, 0.90, 0.95, 1.00, 1.05, 1.10, 1.15, 1.20, 1.25, 1.30, 1.40, 1.50, 1.60, 1.70, 1.80, 2.00, 2.20, 2.50, 3.00]
  affine_max_iter: 200

inference:
  checkpoint_path: outputs/checkpoints/efficientnetv2_m_384_baseline_best.pth
  submission_name: efficientnetv2_m_384_baseline_submission.csv
  clip_eps: 1.0e-4
