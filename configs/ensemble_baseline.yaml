experiment:
  name: ensemble_baseline

paths:
  dev_csv: data/dev.csv
  outputs:
    checkpoints_dir: outputs/checkpoints
    oof_dir: outputs/oof
    logs_dir: outputs/logs
    calibration_dir: outputs/calibration
    submissions_dir: outputs/submissions

calibration:
  allowed_methods: [bias]
  temperature_candidates: [0.5, 0.8, 1.0, 1.2, 1.5, 2.0, 2.5, 3.0, 4.0, 5.0]
  bias_max_iter: 200
  affine_max_iter: 200

ensemble:
  weight_step: 0.05
  selection_split: dev
  final_calibration: true

submission:
  name: ensemble_baseline_submission.csv
  clip_eps: 1.0e-4
  append_timestamp: true

models:
  - name: efficientnetv2_m_384_baseline
    oof_path: outputs/oof/efficientnetv2_m_384_baseline_oof.csv
    dev_path: outputs/oof/efficientnetv2_m_384_baseline_dev_mean.csv
    test_path: outputs/oof/efficientnetv2_m_384_baseline_test_mean.csv
    calibration_path: outputs/calibration/efficientnetv2_m_384_baseline_calibration.json
    min_weight: 1.0
    max_weight: 1.0
