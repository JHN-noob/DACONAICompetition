# Conservative blend between residual model v029 and base model v021.
run_name: blend_v047_residual_v029_shrinkage
seed: 42

paths:
  data_dir: data
  output_dir: outputs

columns:
  id_col: ID
  group_col: scenario_id
  target_col: avg_delay_minutes_next_30m

ensemble:
  members:
    - lightgbm_v029_residual_v021_context_gate
    - lightgbm_v021_no_layout_id_core_holdout_log1p_scenario_relative
  weight_candidates:
    - 0.85
    - 0.90
    - 0.95
    - 1.00
