# Residual correction model using v021 as the base prediction.
run_name: lightgbm_v029_residual_v021_context_gate
seed: 42

paths:
  data_dir: data
  output_dir: outputs

columns:
  id_col: ID
  group_col: scenario_id
  target_col: avg_delay_minutes_next_30m

features:
  use_layout: true
  use_layout_id: false
  use_layout_type: true
  use_layout_interaction_features: true
  use_row_stats: false
  use_scenario_stats: true
  use_scenario_relative_features: true

cv:
  strategy: layout_holdout
  n_splits: 5
  shuffle: true
  random_state: 42
  n_bins: 10

training:
  target_transform: none
  sample_weight_mode: none
  prediction_clip_min: 0.0

residual:
  enabled: true
  base_run_name: lightgbm_v021_no_layout_id_core_holdout_log1p_scenario_relative
  use_base_prediction_feature: true
  base_prediction_feature_name: base_pred_v021
  extra_prediction_features:
    - run_name: lightgbm_v022_residual_stack_v005_context_gate
      feature_name: pred_v022
    - run_name: stack_lgb_meta_v005_context_aware
      feature_name: pred_stack_v005
    - run_name: stack_lgb_meta_v003_log1p_family
      feature_name: pred_stack_v003
    - run_name: lightgbm_v013_no_layout_id_core_holdout_log1p
      feature_name: pred_v013
  generate_prediction_diffs: true
  feature_subset:
    - layout_type
    - base_pred_v021
    - pred_v022
    - pred_stack_v005
    - pred_stack_v003
    - pred_v013
    - diff__base_pred_v021__pred_v022
    - diff__base_pred_v021__pred_stack_v005
    - diff__base_pred_v021__pred_stack_v003
    - diff__base_pred_v021__pred_v013
    - diff__pred_v022__pred_stack_v005
    - diff__pred_v022__pred_stack_v003
    - diff__pred_v022__pred_v013
    - diff__pred_stack_v005__pred_stack_v003
    - diff__pred_stack_v005__pred_v013
    - diff__pred_stack_v003__pred_v013
    - order_inflow_per_pack_station
    - pack_utilization_scenario_mean
    - battery_mean
    - battery_mean_scenario_delta
    - congestion_score_scenario_delta
    - manual_override_ratio_scenario_delta
    - low_battery_ratio_scenario_delta
    - pack_utilization_scenario_delta
    - max_zone_density_scenario_delta
    - order_inflow_15m_scenario_delta
    - avg_trip_distance_scenario_delta
    - loading_dock_util_scenario_delta
    - forklift_active_count_scenario_delta
    - shift_handover_delay_min_scenario_delta

model:
  type: lightgbm
  params:
    objective: mae
    metric: l1
    n_estimators: 5000
    learning_rate: 0.02
    num_leaves: 31
    feature_fraction: 0.85
    bagging_fraction: 0.85
    bagging_freq: 1
    min_child_samples: 120
    min_split_gain: 0.02
    lambda_l1: 2.0
    lambda_l2: 12.0
    random_state: 42
    n_jobs: -1
    verbose: -1
    early_stopping_rounds: 300
    verbose_eval: 200
