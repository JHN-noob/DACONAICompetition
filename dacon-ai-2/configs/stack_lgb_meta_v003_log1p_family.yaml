# Meta model over the three log1p LightGBM variants.
run_name: stack_lgb_meta_v003_log1p_family
seed: 42

paths:
  data_dir: data
  output_dir: outputs

columns:
  id_col: ID
  group_col: scenario_id
  target_col: avg_delay_minutes_next_30m

cv:
  strategy: layout_holdout
  n_splits: 5
  shuffle: true
  random_state: 42
  n_bins: 10

stacking:
  members:
    - lightgbm_v013_no_layout_id_core_holdout_log1p
    - lightgbm_v014_no_layout_id_core_holdout_tuned_log1p
    - lightgbm_v015_no_layout_id_core_holdout_log1p_adv_weighted
  meta_features:
    - member_predictions
    - prediction_stats
    - pairwise_diff
    - layout_type
  meta_model:
    type: lightgbm
    params:
      objective: mae
      metric: l1
      n_estimators: 4000
      learning_rate: 0.02
      num_leaves: 31
      feature_fraction: 0.80
      bagging_fraction: 0.80
      bagging_freq: 1
      min_child_samples: 120
      min_split_gain: 0.02
      lambda_l1: 2.0
      lambda_l2: 12.0
      random_state: 42
      n_jobs: -1
      verbose: -1
      early_stopping_rounds: 200
      verbose_eval: 200

training:
  target_transform: none
  sample_weight_mode: none
